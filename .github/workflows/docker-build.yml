name: Build & Push RunPod Docker Image

on:
  push:
    branches: [ main ]
    paths:
      - 'runpod/**'
      - 'analysis/**'
      - 'r2_storage.py'
  workflow_dispatch:   # permette avvio manuale dal sito GitHub

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: runpod/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/football-analyzer-runpod:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/football-analyzer-runpod:${{ github.sha }}
