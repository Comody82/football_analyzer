<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0B1220; overflow: hidden; width: 100vw; height: 100vh; }
    #tactical-canvas { display: block; width: 100%; height: 100%; }
    #no-data-msg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255,255,255,0.4);
      font-family: Arial, sans-serif;
      font-size: 13px;
      text-align: center;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="tactical-canvas"></canvas>
  <div id="no-data-msg">Esegui prima l'analisi automatica per vedere la lavagna tattica.</div>
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script>
    let backend = null;
    let playerTracks = null;

    new QWebChannel(qt.webChannelTransport, function(channel) {
      backend = channel.objects.backend;
      backend.getPlayerTracksJson(function(json) {
        try { playerTracks = JSON.parse(json); } catch(e) {}
        if (playerTracks && playerTracks.frames && playerTracks.frames.length > 0) {
          document.getElementById('no-data-msg').style.display = 'none';
          startLoop();
        }
      });
    });

    function startLoop() {
      function update() {
        backend.getCurrentPositionMs(function(posMs) {
          drawBoard(posMs);
          setTimeout(() => requestAnimationFrame(update), 100);
        });
      }
      requestAnimationFrame(update);
    }

    function getFrameDetections(posMs) {
      if (!playerTracks || !playerTracks.frames) return [];
      const fps = playerTracks.fps || 3.0;
      const durationMs = playerTracks.frames.length / fps * 1000;
      const ratio = Math.min(1, Math.max(0, posMs / durationMs));
      const idx = Math.min(playerTracks.frames.length - 1, Math.round(ratio * playerTracks.frames.length));
      return (playerTracks.frames[idx] && playerTracks.frames[idx].detections) || [];
    }

    function drawBoard(posMs) {
      const canvas = document.getElementById('tactical-canvas');
      const ctx = canvas.getContext('2d');

      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;

      const PAD = 10;
      const fieldW = canvas.width - PAD * 2;
      const fieldH = canvas.height - PAD * 2;

      ctx.fillStyle = '#166534';
      ctx.fillRect(PAD, PAD, fieldW, fieldH);

      ctx.strokeStyle = 'rgba(255,255,255,0.7)';
      ctx.lineWidth = 1.5;

      ctx.strokeRect(PAD, PAD, fieldW, fieldH);

      ctx.beginPath();
      ctx.moveTo(PAD + fieldW / 2, PAD);
      ctx.lineTo(PAD + fieldW / 2, PAD + fieldH);
      ctx.stroke();

      const rx = (9.15 / 105) * fieldW;
      ctx.beginPath();
      ctx.arc(PAD + fieldW / 2, PAD + fieldH / 2, rx, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(PAD + fieldW / 2, PAD + fieldH / 2, 2, 0, Math.PI * 2);
      ctx.fill();

      const paW = (40.32 / 68) * fieldH;
      const paD = (16.5 / 105) * fieldW;
      const paY = PAD + (fieldH - paW) / 2;
      ctx.strokeRect(PAD, paY, paD, paW);
      ctx.strokeRect(PAD + fieldW - paD, paY, paD, paW);

      const sbW = (18.32 / 68) * fieldH;
      const sbD = (5.5 / 105) * fieldW;
      const sbY = PAD + (fieldH - sbW) / 2;
      ctx.strokeRect(PAD, sbY, sbD, sbW);
      ctx.strokeRect(PAD + fieldW - sbD, sbY, sbD, sbW);

      const dets = getFrameDetections(posMs);
      const videoW = playerTracks.width || 1280;
      const videoH = playerTracks.height || 720;

      const teamColors = {
        0: '#3b82f6',
        1: '#ef4444',
        2: '#f59e0b'
      };

      for (const det of dets) {
        let xm, ym;
        if (det.x_m !== undefined && det.y_m !== undefined) {
          xm = det.x_m;
          ym = det.y_m;
        } else {
          const cx = det.x + det.w / 2;
          const cy = det.y + det.h;
          xm = (cx / videoW) * 105;
          ym = (cy / videoH) * 68;
        }

        xm = Math.max(0, Math.min(105, xm));
        ym = Math.max(0, Math.min(68, ym));

        const px = PAD + (xm / 105) * fieldW;
        const py = PAD + (ym / 68) * fieldH;

        const color = teamColors[det.team] !== undefined ? teamColors[det.team] : '#6b7280';
        const r = 7;

        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(px, py, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.fillStyle = 'white';
        ctx.font = 'bold 8px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(det.track_id, px, py);
      }
    }
  </script>
</body>
</html>
